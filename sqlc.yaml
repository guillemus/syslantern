version: "2"
sql:
  - engine: "sqlite"
    schema: "db/schema.sql"
    queries: "db/queries.sql"
    gen:
      go:
        package: "db"
        out: "db"
        sql_package: "database/sql"
        emit_json_tags: false
        emit_db_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
        overrides:
          - column: "agents.id"
            go_type:
              type: "AgentID"
          - column: "agents.team_id"
            go_type:
              type: "TeamID"
          - column: "teams.id"
            go_type:
              type: "TeamID"
          - column: "teams.agent_api_key"
            go_type:
              type: "AgentAPIKey"
          - column: "users.id"
            go_type:
              type: "UserID"
          - column: "users.team_id"
            go_type:
              type: "TeamID"
          - column: "cpu_samples.id"
            go_type:
              type: "CPUSampleID"
          - column: "disk_samples.id"
            go_type:
              type: "DiskSampleID"
          - column: "memory_samples.id"
            go_type:
              type: "MemorySampleID"
          - column: "sessions.token"
            go_type:
              type: "SessionToken"
        rename:
          root_url: "RootURL"
          favicon_url: "FaviconURL"
          theme_color: "ThemeColor"
          url: "URL"
